<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kokodiv — CRIN Treatment Manual</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@600;700&family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    :root {
      --bg: #FAF9F5;
      --border: #18181B;
      --border-width: 2.5px;
      --shadow-hard: 3px 3px 0px #18181B;
      --shadow-hard-lg: 4px 4px 0px #18181B;
      --text: #18181B;
      --text-muted: #52525B;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', system-ui, sans-serif; }
    body { background-color: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; }

    .icon { display: inline-flex; align-items: center; justify-content: center; width: 1.25rem; height: 1.25rem; stroke-width: 2.5px; }

    .header { padding: 1.25rem 2.5rem; background-color: #FFFFFF; border-bottom: var(--border-width) solid var(--border); display: flex; justify-content: space-between; align-items: center; }
    .brand-logo { font-size: 1.35rem; font-weight: 900; letter-spacing: -0.03em; color: var(--text); display: flex; align-items: center; gap: 0.5rem; text-decoration: none; }
    .brand-logo-badge { background-color: #FEF08A; border: var(--border-width) solid var(--border); padding: 0.15rem 0.5rem; border-radius: 4px; box-shadow: 2px 2px 0px #18181B; font-size: 0.7rem; font-weight: 800; }

    .btn-nav { background-color: #FEF08A; color: var(--text); border: var(--border-width) solid var(--border); box-shadow: var(--shadow-hard); padding: 0.6rem 1.25rem; border-radius: 6px; font-size: 0.875rem; font-weight: 800; text-decoration: none; display: flex; align-items: center; gap: 0.5rem; }
    .btn-nav:hover { transform: translate(-1px, -1px); box-shadow: 4px 4px 0px #18181B; }

    .main-content { max-width: 1200px; margin: 2.5rem auto; padding: 0 2rem; width: 100%; flex: 1; }
    .page-title { font-size: 2.25rem; font-weight: 900; letter-spacing: -0.03em; margin-bottom: 0.5rem; }
    .page-desc { font-size: 1rem; color: var(--text-muted); margin-bottom: 2rem; font-weight: 500; }

    .controls-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; background: #FFFFFF; border: var(--border-width) solid var(--border); box-shadow: var(--shadow-hard); padding: 1rem 1.5rem; border-radius: 8px; }

    .library-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 1.5rem; }
    .lib-card { background-color: #FFFFFF; border: var(--border-width) solid var(--border); box-shadow: var(--shadow-hard-lg); border-radius: 8px; padding: 1.5rem; display: flex; flex-direction: column; gap: 0.85rem; }
    .lib-card-badge { background-color: #DCFCE7; border: var(--border-width) solid var(--border); box-shadow: 2px 2px 0px #18181B; padding: 0.2rem 0.6rem; border-radius: 4px; font-size: 0.75rem; font-weight: 800; width: max-content; }
  </style>
</head>
<body>

  <header class="header">
    <a href="/" class="brand-logo">
      <i data-lucide="sprout" class="icon" style="color: #16A34A;"></i>
      Kokodiv <span class="brand-logo-badge">MANUAL</span>
    </a>
    <div style="display: flex; gap: 1rem;">
      <a href="/app" class="btn-nav">
        <i data-lucide="message-square" class="icon"></i> Open Doctor
      </a>
    </div>
  </header>

  <main class="main-content">
    <h1 class="page-title">CRIN Cocoa Disease Treatment Guide</h1>
    <p class="page-desc">Approved agricultural treatment reference manual compiled from cocoa research agronomists.</p>

    <div class="controls-bar">
      <div style="font-weight: 800; font-size: 0.95rem;">Filter Language:</div>
      <select id="langSelect" onchange="loadCRINManual()" style="background:#FFFFFF; color:var(--text); border:var(--border-width) solid var(--border); box-shadow: 2px 2px 0px #18181B; padding:0.5rem 1rem; border-radius:6px; font-size:0.875rem; font-weight:800;">
        <option value="en">English</option>
        <option value="yo">Yoruba (Èdè Yorùbá)</option>
        <option value="ha">Hausa (Harshen Hausa)</option>
        <option value="ig">Igbo (Asụsụ Igbo)</option>
        <option value="pcm">West African Pidgin</option>
        <option value="fr">French (Français)</option>
        <option value="ar">Arabic (العربية)</option>
        <option value="pt">Portuguese (Português)</option>
        <option value="sw">Swahili (Kiswahili)</option>
      </select>
    </div>

    <div class="library-grid" id="libraryContainer"></div>
  </main>

  <script>
    function initLucide() {
      if (window.lucide) lucide.createIcons();
    }

    async function loadCRINManual() {
      try {
        const lang = document.getElementById("langSelect").value;
        const res = await fetch(`/api/crin/manual?language=${lang}`);
        const data = await res.json();
        const container = document.getElementById("libraryContainer");
        container.innerHTML = "";

        if (data.manual) {
          data.manual.forEach(d => {
            const card = document.createElement("div");
            card.className = "lib-card";
            card.innerHTML = `
              <div class="lib-card-badge">CRIN Ref: ${d.crin_reference}</div>
              <div style="font-size:1.2rem; font-weight:900;">${d.common_name}</div>
              <div style="font-size:0.85rem; color:var(--text-muted); font-style:italic; font-weight:600;">Cause: ${d.pathogen}</div>
              <div style="font-size:0.9rem; line-height:1.5;"><strong>Symptoms:</strong> ${d.symptoms}</div>
              <div style="font-size:0.9rem; line-height:1.5;"><strong>Treatment:</strong> ${d.treatment.join(', ')}</div>
              <div style="font-size:0.85rem; color:var(--text-muted); margin-top:0.25rem; font-weight:500;"><strong>Prevention:</strong> ${d.prevention}</div>
            `;
            container.appendChild(card);
          });
        }
      } catch (err) {}
    }

    window.onload = function() {
      initLucide();
      loadCRINManual();
    };
  </script>
</body>
</html>
